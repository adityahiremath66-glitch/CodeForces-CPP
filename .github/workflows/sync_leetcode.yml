name: Sync LeetCode
on:
  workflow_dispatch:      
  schedule:
    - cron: '0 8 * * *'    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run LeetCode Sync
        uses: joshcai/leetcode-sync@v1.7 # Removed the .0
        with:
          github-token: ${{ github.token }} # Use the internal token
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: solutions
          verbose: true
